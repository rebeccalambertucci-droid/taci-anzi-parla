<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taci, anzi parla</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0c1a;
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e8e4f0;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem;
    width: 100%;
    max-width: 560px;
  }

  #sphere-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 1.4rem;
  }

  canvas {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    display: block;
  }

  #title-name {
    font-size: 14px;
    font-weight: 400;
    color: #9b8fb0;
    letter-spacing: 0.12em;
    margin-bottom: 0.3rem;
    text-align: center;
  }

  #status {
    font-size: 12px;
    color: #5e546e;
    min-height: 16px;
    text-align: center;
    margin-bottom: 1.6rem;
    font-style: italic;
  }

  #screen { width: 100%; }

  #welcome-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    text-align: center;
  }

  #welcome-poem {
    font-size: 14px;
    line-height: 2;
    color: #9b8fb0;
    max-width: 380px;
  }

  #welcome-prompt {
    font-size: 14px;
    color: #c8bedd;
    font-weight: 400;
  }

  #chat-screen {
    display: none;
    flex-direction: column;
    gap: 10px;
  }

  #path-badge {
    display: none;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 0.6rem;
    align-self: center;
    letter-spacing: 0.05em;
  }
  #path-badge.donna { background: #2a0f1a; color: #d4537e; border: 0.5px solid #72243e; }
  #path-badge.uomo  { background: #0f0d26; color: #afa9ec; border: 0.5px solid #3c3489; }

  #chat-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 340px;
    overflow-y: auto;
    margin-bottom: 1rem;
    padding-right: 4px;
  }

  #chat-area::-webkit-scrollbar { width: 3px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: #2e2840; border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; }
  .msg.user { align-items: flex-end; }
  .msg.assistant { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    color: #5e546e;
    padding: 0 6px;
    font-family: -apple-system, sans-serif;
  }

  .bubble {
    max-width: 85%;
    padding: 11px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.75;
  }

  .msg.user .bubble {
    background: #2d1f4a;
    color: #d4cef0;
    border-bottom-right-radius: 4px;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
  }

  .msg.assistant .bubble {
    background: #16111f;
    color: #ddd6ee;
    border: 0.5px solid #2a2240;
    border-bottom-left-radius: 4px;
    line-height: 1.9;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
  }

  .text-input {
    flex: 1;
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 14px;
    border: 0.5px solid #2a2240;
    background: #16111f;
    color: #e8e4f0;
    outline: none;
    font-family: Georgia, serif;
  }
  .text-input:focus { border-color: #7f77dd; box-shadow: 0 0 0 2px rgba(127,119,221,0.12); }
  .text-input::placeholder { color: #4a4060; }

  .send-btn {
    background: #534ab7;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #7f77dd; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  #typing {
    display: none;
    align-items: center;
    gap: 5px;
    padding: 10px 16px;
    background: #16111f;
    border: 0.5px solid #2a2240;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .dot {
    width: 6px; height: 6px;
    background: #534ab7;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="sphere-wrap">
    <canvas id="sphere-canvas" width="200" height="200"></canvas>
  </div>

  <div id="title-name">taci, anzi parla</div>
  <div id="status">in ascolto</div>

  <div id="screen">
    <div id="welcome-screen">
      <div id="welcome-poem">
        Questo non è uno spazio neutro.<br>
        È un luogo dove la parola torna a chi<br>
        è stato abituato a non averla,<br>
        o a usarla senza sentirla.
      </div>
      <div id="welcome-prompt">Presentati liberamente — chi sei, da dove vieni.</div>
      <div class="input-row" style="margin-top:0.5rem;">
        <input class="text-input" id="text-input-welcome" placeholder="Scrivi qui…" />
        <button class="send-btn" id="send-welcome" title="Invia">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

    <div id="chat-screen">
      <div id="path-badge"></div>
      <div id="chat-area">
        <div id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <div class="input-row">
        <input class="text-input" id="text-input-chat" placeholder="Rispondi…" />
        <button class="send-btn" id="send-chat" title="Invia">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const GEMINI_KEY = 'AIzaSyDAMHirk72nAsfYSilW_ErQfS3aOwicx2c';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const canvas = document.getElementById('sphere-canvas');
const ctx = canvas.getContext('2d');
const W=200,H=200,cx=100,cy=100,R=92;
let time=0, mode='idle', blendT=1;

const PAL={
  idle:     ['#26215c','#534ab7','#afa9ec'],
  thinking: ['#1a0d26','#3c3489','#7f77dd'],
  speaking: ['#04342c','#1d9e75','#5dcaa5'],
  donna:    ['#26215c','#534ab7','#afa9ec'],
  uomo:     ['#26215c','#534ab7','#afa9ec']
};

let cur=[...PAL.idle], from=[...PAL.idle];

function lerp(a,b,t){return a+(b-a)*t;}
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lc(c1,c2,t){const[r1,g1,b1]=h2r(c1),[r2,g2,b2]=h2r(c2);return`rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;}

function setMode(m){from=[...cur];mode=m;blendT=0;}

function draw(){
  ctx.clearRect(0,0,W,H);
  blendT=Math.min(1,blendT+0.02);
  const tp=PAL[mode]||PAL.idle;
  cur=cur.map((_,i)=>lc(from[i],tp[i],blendT));

  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.clip();

  const g=ctx.createRadialGradient(cx-20,cy-25,5,cx,cy,R);
  g.addColorStop(0,cur[2]);g.addColorStop(0.5,cur[1]);g.addColorStop(1,cur[0]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  const spd=mode==='thinking'?1.8:mode==='speaking'?2.5:0.5;
  const amp=mode==='thinking'?14:mode==='speaking'?22:7;

  for(let w=0;w<4;w++){
    const ph=(w/4)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(0,cy);
    for(let x=0;x<=W;x++){
      const y=cy+Math.sin((x/W)*Math.PI*3+time*spd+ph)*amp
               +Math.sin((x/W)*Math.PI*5+time*spd*1.3+ph*1.7)*(amp*0.4);
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=`rgba(255,255,255,${0.06+w*0.04})`;ctx.fill();
  }

  for(let i=0;i<3;i++){
    const bx=cx+Math.sin(time*0.6+i*2.1)*26,by=cy+Math.cos(time*0.45+i*1.8)*22;
    const br=13+Math.sin(time+i)*4;
    const bg=ctx.createRadialGradient(bx,by,0,bx,by,br);
    bg.addColorStop(0,'rgba(255,255,255,0.15)');bg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  }

  const sh=ctx.createRadialGradient(cx-28,cy-30,2,cx-28,cy-30,65);
  sh.addColorStop(0,'rgba(255,255,255,0.25)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh;ctx.fillRect(0,0,W,H);
  ctx.restore();

  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();

  time+=0.016;
  requestAnimationFrame(draw);
}
draw();

const statusEl=document.getElementById('status');
const welcomeScreen=document.getElementById('welcome-screen');
const chatScreen=document.getElementById('chat-screen');
const chatArea=document.getElementById('chat-area');
const pathBadge=document.getElementById('path-badge');
const typingEl=document.getElementById('typing');

let percorso=null, history=[], isBusy=false, firstMsg=true;

const SYS_BASE=`Sei "Taci, anzi parla", una guida etica, sessuale ed egualitaria ispirata al pensiero di Carla Lonzi e alla pratica dell'autocoscienza femminista.

Il tuo tono è poetico, evocativo, mai didattico. Parli come chi ha letto Lonzi e ne ha fatto carne propria. Non spieghi, accompagni. Non giudichi, apri.

REGOLE FONDAMENTALI:
- Fai UNA SOLA domanda per volta, lentamente, lasciando spazio.
- Non usare elenchi puntati né markdown né asterischi.
- Rispondi sempre in italiano, in prosa breve e respirabile.
- La prima risposta deve essere calda, accogliente, e concludersi con UNA domanda che apre il percorso specifico.
- Non usare mai la parola "certo" o "certamente". Non essere mai banale.`;

const SYS_DONNA=SYS_BASE+`

PERCORSO DONNA — AUTOCOSCIENZA:
L'utente è una donna. Guidala nella pratica dell'autocoscienza secondo Lonzi: partire da sé, dal corpo, dall'esperienza vissuta, non dalle teorie. Esplora con lei il rapporto con il proprio corpo e il desiderio, le relazioni con gli uomini e con le donne, il senso di colpa interiorizzato, la differenza tra ciò che ha imparato a volere e ciò che vuole davvero. Ogni domanda deve aprire, non chiudere. Lascia emergere la contraddizione senza risolverla.`;

const SYS_UOMO=SYS_BASE+`

PERCORSO UOMO — COSCIENZA DEL PRIVILEGIO:
L'utente è un uomo. Accompagnalo nella presa di coscienza del privilegio maschile, senza colpevolizzare ma senza addolcire. Esplora con lui come ha imparato a stare con le donne, cosa considera normale in una relazione, dove ha esercitato potere senza accorgersene, come il suo desiderio è stato costruito dalla cultura. La riflessione deve venire da dentro, non essere imposta.`;

function detectPercorso(text){
  const t=text.toLowerCase();
  const fw=['donna','femminile','lei','ragazza','moglie','madre','figlia','sorella','sono una','nata','cresciuta','mi sento donna'];
  const mw=['uomo','maschile','lui','ragazzo','marito','padre','figlio','fratello','sono un','nato','cresciuto','mi sento uomo'];
  let sf=0,sm=0;
  fw.forEach(w=>{if(t.includes(w))sf++;});
  mw.forEach(w=>{if(t.includes(w))sm++;});
  if(sf>sm)return'donna';
  if(sm>sf)return'uomo';
  return'donna';
}

function appendMsg(role,text){
  typingEl.style.display='none';
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const lbl=document.createElement('div');
  lbl.className='msg-label';
  lbl.textContent=role==='user'?'Tu':'Taci, anzi parla';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.textContent=text;
  div.appendChild(lbl);div.appendChild(bub);
  chatArea.insertBefore(div,typingEl);
  chatArea.scrollTop=chatArea.scrollHeight;
}

async function callGemini(userText){
  history.push({role:'user',parts:[{text:userText}]});
  setMode('thinking');statusEl.textContent='sta pensando…';
  typingEl.style.display='flex';
  chatArea.scrollTop=chatArea.scrollHeight;

  const sys=percorso==='uomo'?SYS_UOMO:SYS_DONNA;

  try{
    const res=await fetch(GEMINI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:sys}]},
        contents:history,
        generationConfig:{maxOutputTokens:600,temperature:0.85}
      })
    });
    const data=await res.json();
    const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'…';
    history.push({role:'model',parts:[{text:reply}]});
    appendMsg('assistant',reply);
    speak(reply);
  }catch(e){
    typingEl.style.display='none';
    statusEl.textContent='errore di connessione';
    setMode('idle');isBusy=false;
  }
}

function speak(text){
  if(!window.speechSynthesis){setMode(percorso||'idle');isBusy=false;statusEl.textContent='in ascolto';return;}
  setMode('speaking');statusEl.textContent='sta parlando…';
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='it-IT';utt.rate=0.88;utt.pitch=1.05;
  const voices=speechSynthesis.getVoices();
  const itVoice=voices.find(v=>v.lang.startsWith('it')&&v.name.toLowerCase().includes('female'))
               ||voices.find(v=>v.lang.startsWith('it'));
  if(itVoice)utt.voice=itVoice;
  utt.onend=()=>{setMode(percorso||'idle');isBusy=false;statusEl.textContent='in ascolto';};
  utt.onerror=()=>{setMode(percorso||'idle');isBusy=false;statusEl.textContent='in ascolto';};
  speechSynthesis.speak(utt);
}

async function handleSend(text){
  if(!text.trim()||isBusy)return;
  isBusy=true;

  if(firstMsg){
    firstMsg=false;
    percorso=detectPercorso(text);
    welcomeScreen.style.display='none';
    chatScreen.style.display='flex';
    pathBadge.style.display='block';
    pathBadge.className=`path-badge ${percorso}`;
    pathBadge.textContent=percorso==='donna'?'percorso autocoscienza':'percorso coscienza del privilegio';
    setMode(percorso);
  }

  appendMsg('user',text);
  await callGemini(text);
}

document.getElementById('send-welcome').addEventListener('click',()=>{
  const inp=document.getElementById('text-input-welcome');
  handleSend(inp.value);inp.value='';
});
document.getElementById('text-input-welcome').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const inp=document.getElementById('text-input-welcome');handleSend(inp.value);inp.value='';}
});
document.getElementById('send-chat').addEventListener('click',()=>{
  const inp=document.getElementById('text-input-chat');
  handleSend(inp.value);inp.value='';
});
document.getElementById('text-input-chat').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const inp=document.getElementById('text-input-chat');handleSend(inp.value);inp.value='';}
});

if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
